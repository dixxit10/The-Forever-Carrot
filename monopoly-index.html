<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>牛馬職員進化論：隨機大富翁篇</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --bg:#F7F7F5;
    --panel:#FFFFFF;
    --ink:#2B2B2B;
    --line:#3A3A3A;
    --gray:#9B9B96;
    --gray-light:#E4E3DF;
    /* 水藍色系 Theme */
    --cyan:#4FA8D1;
    --cyan-dark:#3A8E16;
    --cyan-dark-real:#2F7FA4;
    --cyan-light:#E6F4FA;
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{ background:var(--bg); color:var(--ink); overflow:hidden; -webkit-font-smoothing:antialiased; }
  #app{ position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  .screen{ display:none; width:100%; height:100%; flex-direction:column; align-items:center; }
  .screen.active{ display:flex; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  .btn{ padding:11px 26px; border-radius:999px; border:1.5px solid var(--line); background:var(--panel); color:var(--ink); font-size:13px; font-weight:600; transition:all .15s ease; }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 6px 14px rgba(0,0,0,.08); }
  .btn.primary{ background:var(--cyan); border-color:var(--cyan); color:#fff; box-shadow:0 6px 18px rgba(79,168,209,.35); }
  .btn.primary:hover{ background:var(--cyan-dark-real); border-color:var(--cyan-dark-real); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .eyebrow{ font-size:11px; letter-spacing:3px; color:var(--gray); text-transform:uppercase; font-weight:700; }

  /* ---- stick figure ---- */
  .figure{ position:relative; width:56px; height:92px; transform-origin:50% 100%; transition:transform .3s ease; }
  .figure .head{ width:26px; height:26px; border-radius:50%; border:2.2px solid var(--line); background:var(--panel); margin:0 auto; display:flex; align-items:center; justify-content:center; }
  .figure .eyes{ font-size:8px; font-weight:700; color:var(--line); white-space:nowrap; }
  .figure .torso{ width:2.2px; height:28px; background:var(--line); margin:2px auto 0; }
  .figure .arms{ width:38px; height:2.2px; background:var(--line); margin:0 auto; }
  .figure .legs{ position:relative; width:26px; margin:0 auto; height:26px; }
  .figure .legs::before,.figure .legs::after{ content:""; position:absolute; top:0; width:2.2px; height:26px; background:var(--line); }
  .figure .legs::before{ left:5px; transform:rotate(10deg); transform-origin:top; }
  .figure .legs::after{ right:5px; transform:rotate(-10deg); transform-origin:top; }
  .figure.hunch{ transform:rotate(15deg) translateY(3px); }
  .figure .label{ position:absolute; bottom:-20px; left:0; right:0; text-align:center; font-size:10.5px; color:var(--gray); font-weight:600; white-space:nowrap; }

  /* ---- start screen ---- */
  #screen-start{ justify-content:flex-start; padding-top:8vh; gap:5vh; }
  .title-block{ text-align:center; }
  .title-block h1{ font-size:22px; margin-top:6px; }
  .roster{ display:flex; gap:24px; align-items:flex-end; }
  .roster-item{ display:flex; flex-direction:column; align-items:center; padding:18px 12px 30px; border-radius:16px; cursor:pointer; transition:background .2s ease; }
  .roster-item:hover{ background:var(--gray-light); }
  .unlock-row{ min-height:50px; display:flex; align-items:center; justify-content:center; }

  #modal-overlay{ position:fixed; inset:0; background:rgba(20,20,20,.35); display:none; align-items:center; justify-content:center; z-index:80; }
  #modal-overlay.active{ display:flex; }
  .modal-box{ background:var(--panel); border:2px solid var(--cyan); border-radius:18px; padding:24px 28px; max-width:320px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.15); }
  .modal-box p{ font-size:14px; line-height:1.7; margin-bottom:16px; }

  /* ---- game screen ---- */
  #screen-game{ justify-content:flex-start; padding:20px 4vw 0; }
  .statusbar{ width:100%; max-width:600px; display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:var(--panel); border-radius:14px; border:1px solid var(--gray-light); }
  .stat-label{ font-size:9.5px; letter-spacing:1.5px; color:var(--gray); font-weight:700; }
  .stat-value{ font-size:17px; font-weight:800; margin-top:2px; }
  #salary-value.hit{ animation:shake .3s ease; color:var(--cyan); }
  #mental-blocks{ display:flex; gap:3px; margin-top:4px; }
  .m-block{ width:12px; height:12px; border-radius:3px; background:var(--cyan); }
  .m-block.empty{ background:var(--gray-light); }
  .stat-day{ text-align:center; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-3px);} 75%{transform:translateX(3px);} }

  .board-wrap{ position:relative; margin-top:18px; }
  .board{
    position:relative;
    display:grid;
    grid-template-columns:repeat(7,58px);
    grid-template-rows:repeat(7,58px);
    gap:4px;
    background:var(--panel);
    border:1px solid var(--gray-light);
    border-radius:16px;
    padding:14px;
  }
  .cell{
    border:1.3px solid var(--gray-light);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; color:var(--gray); font-weight:700;
    position:relative;
    background:var(--bg);
  }
  .cell.task{ border-color:var(--line); color:var(--ink); background:#fff; }
  .cell.task .tnum{ font-size:13px; }
  .cell.task.done{ background:var(--cyan-light); border-color:var(--cyan); color:var(--cyan-dark-real); }
  .cell.start{ background:var(--line); color:#fff; font-size:9.5px; letter-spacing:1px; }
  .cell.deco::after{ content:""; width:5px; height:5px; border-radius:50%; background:var(--gray-light); }
  .cell.crown{ border-color:var(--cyan); background:var(--cyan-light); }

  .office-deco{
    grid-column:2 / 7; grid-row:2 / 7;
    position:relative;
    display:flex; align-items:center; justify-content:center;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(0,0,0,.025) 30px, rgba(0,0,0,.025) 31px),
      repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(0,0,0,.025) 30px, rgba(0,0,0,.025) 31px);
    border-radius:10px;
  }
  .desk{ position:absolute; width:46px; height:26px; border:2px solid var(--line); border-radius:3px; background:#fff; transform:skewX(-14deg); }
  .desk::after{ content:""; position:absolute; top:5px; left:8px; width:16px; height:11px; border:1.5px solid var(--line); }
  .desk1{ top:26px; left:18px; }
  .desk2{ top:26px; right:18px; }
  .desk3{ bottom:20px; left:50%; transform:translateX(-50%) skewX(-14deg); }
  .plant{ position:absolute; bottom:8px; right:8px; width:12px; height:16px; border-left:1.6px solid var(--line); border-right:1.6px solid var(--line); border-bottom:1.6px solid var(--line); border-radius:0 0 3px 3px; }
  .plant::before{ content:""; position:absolute; top:-10px; left:-3px; width:18px; height:14px; border:1.6px solid var(--line); border-radius:50% 50% 50% 0; }

  .token{
    position:absolute; width:20px; height:20px; border-radius:50%;
    background:var(--cyan); border:2px solid var(--cyan-dark-real);
    transition:left .25s ease, top .25s ease;
    z-index:10;
    display:flex; align-items:center; justify-content:center;
    font-size:8px; color:#fff; font-weight:800;
  }

  .dice-panel{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    background:rgba(247,247,245,.88);
    border-radius:16px;
    transition:opacity .25s ease;
  }
  .dice-panel.hidden{ opacity:0; pointer-events:none; }
  .dice{
    width:56px; height:56px; border:2.4px solid var(--line); border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:800; color:var(--cyan-dark-real);
    background:#fff;
  }
  .dice.rolling{ animation:diceroll .08s linear infinite; }
  @keyframes diceroll{ from{ transform:rotate(0deg);} to{ transform:rotate(20deg);} }

  .event-modal{
    position:absolute; inset:0;
    display:none;
    align-items:center; justify-content:center;
    background:rgba(20,20,20,.28);
    border-radius:16px;
    z-index:20;
  }
  .event-modal.active{ display:flex; }
  .event-card{
    width:350px; max-height:95%;
    overflow-y:auto;
    background:var(--panel);
    border:1.5px solid var(--gray-light);
    border-radius:16px;
    padding:22px 22px 20px;
    display:flex; flex-direction:column; gap:14px;
    box-shadow:0 20px 50px rgba(0,0,0,.18);
  }
  .event-tag{ font-size:10px; letter-spacing:1.5px; color:var(--cyan-dark-real); font-weight:800; }
  .actors-row{ display:flex; justify-content:space-around; }
  .dialogue-box{ background:var(--bg); border:1.3px solid var(--line); border-radius:10px; padding:14px 16px; font-size:13.5px; line-height:1.7; min-height:48px; }
  .choices{ display:flex; gap:10px; justify-content:center; flex-direction:column; width:100%; }
  .choices .btn{ text-align:left; padding:10px 16px; border-radius:8px; font-size:12.5px; width:100%; }
  .choices .btn:hover{ background:var(--cyan-light); border-color:var(--cyan); }

  .card-wrap{ display:flex; justify-content:center; padding:6px 0; }
  .card{ width:220px; height:140px; perspective:1000px; }
  .card-inner{ width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .5s ease; }
  .card.flipped .card-inner{ transform:rotateY(180deg); }
  .card-face{ position:absolute; inset:0; border-radius:12px; display:flex; align-items:center; justify-content:center; text-align:center; padding:14px; font-size:12.5px; line-height:1.55; backface-visibility:hidden; border:1.3px solid var(--line); }
  .card-front{ background:var(--bg); font-weight:600; color:var(--line); }
  .card-back{ background:var(--cyan); color:#fff; transform:rotateY(180deg); flex-direction:column; gap:6px; }
  .card-back .seal{ font-size:10px; letter-spacing:1.5px; font-weight:800; text-transform:uppercase; background:rgba(0,0,0,.15); padding:2px 8px; border-radius:4px; }

  /* ---- catch minigame ---- */
  .catch-area{ position:relative; width:100%; height:190px; background:var(--bg); border:1.3px solid var(--gray-light); border-radius:10px; overflow:hidden; }
  .catch-item{ position:absolute; top:-20px; width:20px; height:20px; }
  .catch-item.doc{ background:var(--cyan); border:1.5px solid var(--cyan-dark-real); border-radius:2px; }
  .catch-item.trash{ width:0; height:0; border-left:11px solid transparent; border-right:11px solid transparent; border-bottom:20px solid #FF5A5A; background:none; }
  .paddle{ position:absolute; bottom:6px; width:46px; height:46px; transition:left .12s linear; }
  .catch-controls{ display:flex; justify-content:center; gap:10px; width:100%; }
  .catch-controls .btn{ flex:1; text-align:center; }
  .catch-hud{ display:flex; justify-content:space-between; font-size:11.5px; color:var(--gray); font-weight:700; }
  .catch-tip{ font-size:11px; text-align:center; color:var(--gray); background:var(--gray-light); padding:5px; border-radius:6px; margin-bottom:-4px; }

  /* ---- memory minigame ---- */
  .memory-grid{ display:grid; grid-template-columns:repeat(3,84px); gap:10px; justify-content:center; }
  .mem-card{ width:84px; height:64px; border-radius:10px; border:1.5px solid var(--line); background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; cursor:pointer; text-align:center; }
  .mem-card.flipped{ background:#fff; color:var(--cyan-dark-real); }
  .mem-card.matched{ background:var(--cyan-light); border-color:var(--cyan); color:var(--cyan-dark-real); cursor:default; }
  .memory-hud{ text-align:center; font-size:12px; color:var(--gray); font-weight:700; }

  /* ---- telepathy ---- */
  .tele-req{ text-align:center; font-size:13px; background:var(--cyan-light); color:var(--cyan-dark-real); border-radius:10px; padding:12px; font-weight:700; border-left:4px solid var(--cyan); }
  .tele-options{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:5px; }
  .art-plate{ border:1.5px solid var(--gray-light); border-radius:10px; padding:8px; text-align:center; cursor:pointer; background:var(--bg); transition:border 0.2s; }
  .art-plate:hover{ border-color:var(--cyan); background:#fff; }
  .art-canvas{ width:100%; height:75px; border:1.3px solid var(--line); border-radius:6px; background:#fff; margin-bottom:6px; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .art-canvas.art-a{ background:linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%); background-size:16px 16px; background-color:#333; }
  .art-canvas.art-b{ background:radial-gradient(circle, var(--cyan) 10%, transparent 11%), radial-gradient(circle at bottom left, var(--cyan-light) 40%, transparent 42%); background-color:#fff; }
  .art-canvas.art-c{ background:repeating-linear-gradient(45deg, transparent, transparent 10px, var(--line) 10px, var(--line) 12px); background-color:#f0f0f0; }
  .art-canvas.art-d{ background:linear-gradient(to right, #000, #4FA8D1, #FFF); }
  .art-title{ font-size:11.5px; font-weight:600; color:var(--ink); }

  .next-row{ display:flex; gap:10px; justify-content:center; width:100%; margin-top:5px; }
  .next-row .btn { flex: 1; text-align: center; padding: 10px 0; }

  /* ---- end screen ---- */
  #screen-end{ justify-content:center; }
  .cert{ width:340px; background:var(--panel); border:1.5px solid var(--line); border-radius:6px; padding:30px 26px; text-align:center; box-shadow:0 24px 60px rgba(0,0,0,.14); animation:drop .5s ease; }
  @keyframes drop{ from{ transform:translateY(-40px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .cert h2{ font-size:11px; letter-spacing:2px; color:var(--gray); margin-bottom:16px; }
  .cert .ending-title{ font-size:18px; font-weight:800; color:var(--cyan-dark-real); margin-bottom:16px; }
  .cert .ending-fig{ display:flex; justify-content:center; margin-bottom:14px; }
  .cert .quote{ font-size:13px; line-height:1.8; border-top:1px dashed var(--gray-light); padding-top:14px; }
  .end-buttons{ display:flex; gap:12px; margin-top:22px; justify-content:center; }
  
  /* ---- shutdown overlay ---- */
  #screen-shutdown{ position:fixed; inset:0; background:#111; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:100; }
  #screen-shutdown.active{ display:flex; }
  #screen-shutdown p{ color:var(--cyan); font-size:14px; letter-spacing:1px; font-weight:500; }
  #screen-shutdown .btn-restart-dark { background:transparent; border:1px solid #444; color:#888; font-size:12px; padding:8px 20px; border-radius:6px; transition:all 0.2s; }
  #screen-shutdown .btn-restart-dark:hover { border-color:var(--cyan); color:#fff; background:rgba(79,168,209,0.1); }
</style>
</head>
<body>
<div id="app">

  <!-- START SCREEN -->
  <div id="screen-start" class="screen active">
    <div class="title-block">
      <div class="eyebrow">Project</div>
      <h1>[ Ultimate Corporate Slave Evolution ]</h1>
    </div>
    <div class="roster" id="roster"></div>
    <div class="unlock-row" id="unlock-row"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">
    <div class="statusbar">
      <div><div class="stat-label">SALARY</div><div class="stat-value" id="salary-value">$4,500</div></div>
      <div class="stat-day"><div class="stat-label">TASK COMPLETED</div><div class="stat-value" id="step-value">0 / 10</div></div>
      <div style="text-align:right;"><div class="stat-label">MENTAL HEALTH</div><div id="mental-blocks"></div></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board">
        <div class="office-deco">
          <div class="desk desk1"></div>
          <div class="desk desk2"></div>
          <div class="desk desk3"></div>
          <div class="plant"></div>
        </div>
        <div class="token" id="token"></div>
      </div>

      <div class="dice-panel" id="dice-panel">
        <div class="dice" id="dice">🎲</div>
        <button class="btn primary" id="btn-roll">擲骰子 (Roll)</button>
      </div>

      <div class="event-modal" id="event-modal">
        <div class="event-card" id="event-card"></div>
      </div>
    </div>
  </div>

  <!-- END SCREEN -->
  <div id="screen-end" class="screen">
    <div class="cert">
      <h2>牛馬職員職位評定書</h2>
      <div class="ending-fig" id="ending-fig"></div>
      <div class="ending-title" id="ending-title"></div>
      <div class="quote" id="ending-quote"></div>
      <div class="end-buttons">
        <button class="btn primary" id="btn-reincarnate">重新投胎 (Reincarnate)</button>
        <button class="btn" id="btn-shutdown">關閉電腦 (Shutdown)</button>
      </div>
    </div>
  </div>

  <!-- SHUTDOWN SCREEN WITH RESTART BUTTON -->
  <div id="screen-shutdown">
    <p>明天還是要準時打卡喔。</p>
    <button class="btn-restart-dark" id="btn-final-restart">重返陽間 (Restart)</button>
  </div>

  <div id="modal-overlay">
    <div class="modal-box">
      <p id="modal-text"></p>
      <button class="btn primary" id="modal-close">請重選</button>
    </div>
  </div>
</div>

<script>
/* ================= GLOBAL GAME VARS & LIFECYCLES ================= */
let catchSpawnTimer = null;
let catchLoopId = null;

/* ================= FIGURE ================= */
function figureHTML(id, labelText){
  return `<div class="figure" id="${id}">
    <div class="head"><span class="eyes">· _ ·</span></div>
    <div class="torso"></div>
    <div class="arms"></div>
    <div class="legs"></div>
    ${labelText ? `<div class="label">${labelText}</div>` : ""}
  </div>`;
}
function setExpression(el, state){
  if(!el) return;
  const eyes = el.querySelector(".eyes");
  el.classList.remove("hunch");
  if(state === "sad"){ eyes.textContent = "-__-"; }
  else if(state === "dead"){ eyes.textContent = "x_x"; }
  else if(state === "hunch"){ eyes.textContent = "· _ ·"; el.classList.add("hunch"); }
  else { eyes.textContent = "· _ ·"; }
}

/* ================= START SCREEN ================= */
const roster = document.getElementById("roster");
const unlockRow = document.getElementById("unlock-row");
const modalOverlay = document.getElementById("modal-overlay");
const modalText = document.getElementById("modal-text");

const rosterData = [
  { id:"ceo", label:"董事長", msg:"很抱歉，首抽投胎是門技術活，看來你上輩子沒練好。請重選。", ok:false },
  { id:"kin", label:"董事長親友", msg:"你跟董事長目前唯一的交集只有在同一個地球上。請重選。", ok:false },
  { id:"mgr", label:"管理幹部", msg:"你才剛入職就想一步登天? 請你重選。", ok:false },
  { id:"slave", label:"牛馬職員", msg:"", ok:true },
  { id:"jan", label:"清潔人員", msg:"你打掃除沒人乾淨，練好再來，請你重選。", ok:false },
];
rosterData.forEach(r=>{
  const div = document.createElement("div");
  div.className = "roster-item";
  div.innerHTML = figureHTML("fig-"+r.id, r.label);
  div.addEventListener("click", ()=> onRosterClick(r));
  roster.appendChild(div);
});
function onRosterClick(r){
  if(!r.ok){ modalText.textContent = r.msg; modalOverlay.classList.add("active"); return; }
  const fig = document.getElementById("fig-slave");
  fig.classList.add("hunch");
  if(!document.getElementById("btn-enter")){
    const btn = document.createElement("button");
    btn.id = "btn-enter"; btn.className = "btn primary"; btn.textContent = "進入公司 (Start Game)";
    btn.style.marginTop = "8px";
    btn.addEventListener("click", startGame);
    unlockRow.appendChild(btn);
  }
}
document.getElementById("modal-close").addEventListener("click", ()=> modalOverlay.classList.remove("active"));

/* ================= BOARD SETUP ================= */
function buildPerimeter(n){
  const cells=[];
  for(let c=1;c<=n;c++) cells.push({row:1,col:c});
  for(let r=2;r<=n;r++) cells.push({row:r,col:n});
  for(let c=n-1;c>=1;c--) cells.push({row:n,col:c});
  for(let r=n-1;r>=2;r--) cells.push({row:r,col:1});
  return cells;
}
const N = 7;
const PERIM = buildPerimeter(N);

const boardEl = document.getElementById("board");
function renderBoard(){
  document.querySelectorAll(".cell").forEach(c=>c.remove());
  PERIM.forEach((pos, idx)=>{
    const div = document.createElement("div");
    div.dataset.index = idx;
    let cls = "cell deco";
    let inner = "";
    if(idx === 0){ cls = "cell start"; inner = "入口"; }
    else if(idx === 12) { cls = "cell task crown"; inner = `<span class="tnum">👑</span>`; }
    else if(idx % 2 === 0) {
      cls = "cell task";
      inner = `<span class="tnum">!</span>`;
    }
    div.className = cls;
    div.innerHTML = inner;
    div.style.gridRow = pos.row;
    div.style.gridColumn = pos.col;
    boardEl.appendChild(div);
  });
}
renderBoard();

/* ================= POOLED RANDOM EVENTS ================= */
const DIALOGUE_POOL = [

/* ================= GAME STATE ================= */
let state = { salary:4500, mental:5, step:0, pos:0 };
let currentEventPool = [];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function initEventPool() {
  const dialogues = shuffle([...DIALOGUE_POOL]);
  const cards = shuffle([...CARD_POOL]);
  const games = [...GAME_POOL];

  currentEventPool = [];
  for(let i=0; i<3; i++) {
    currentEventPool.push(dialogues[i]);
    currentEventPool.push(cards[i]);
    currentEventPool.push(games[i]);
  }
  shuffle(currentEventPool);
  currentEventPool.push(FINAL_BOSS_EVENT);
}

function startGame(){
  state = { salary:4500, mental:5, step:0, pos:0 };
  initEventPool();
  document.getElementById("screen-start").classList.remove("active");
  document.getElementById("screen-game").classList.add("active");
  document.querySelectorAll(".cell").forEach(c=>c.classList.remove("done"));
  renderStatus();
  requestAnimationFrame(()=>{ placeTokenAt(0, true); });
  document.getElementById("dice-panel").classList.remove("hidden");
  document.getElementById("event-modal").classList.remove("active");
}

function renderStatus(flash){
  const salEl = document.getElementById("salary-value");
  salEl.textContent = "$"+Math.max(0,state.salary).toLocaleString();
  if(flash){ salEl.classList.remove("hit"); void salEl.offsetWidth; salEl.classList.add("hit"); }
  document.getElementById("step-value").textContent = `${state.step} / 10`;
  const blocksWrap = document.getElementById("mental-blocks");
  blocksWrap.innerHTML = "";
  for(let i=0;i<5;i++){
    const b = document.createElement("div");
    b.className = "m-block" + (i < state.mental ? "" : " empty");
    blocksWrap.appendChild(b);
  }
}

function applyEffect(eff){
  if(!eff) return;
  if(eff.salary) state.salary = Math.max(0, state.salary + eff.salary);
  if(eff.mental) state.mental = Math.max(0, Math.min(5, state.mental + eff.mental));
  renderStatus(true);
}

/* ================= TOKEN MOVEMENT ================= */
const tokenEl = document.getElementById("token");
function placeTokenAt(idx, instant){
  const cell = boardEl.querySelector(`.cell[data-index="${idx}"]`);
  if(!cell) return;
  const left = cell.offsetLeft + cell.offsetWidth/2 - tokenEl.offsetWidth/2;
  const top = cell.offsetTop + cell.offsetHeight/2 - tokenEl.offsetHeight/2;
  if(instant){ tokenEl.style.transition = "none"; }
  tokenEl.style.left = left+"px";
  tokenEl.style.top = top+"px";
  if(instant){ requestAnimationFrame(()=>{ tokenEl.style.transition = ""; }); }
}
function moveTokenAlong(from, steps, onDone){
  let cur = from;
  let target = from + steps;
  function step(){
    if(cur >= target){ onDone(); return; }
    cur += 1;
    let mapIdx = cur % 24;
    placeTokenAt(mapIdx);
    setTimeout(step, 180);
  }
  step();
}

/* ================= ROLL / DICE ================= */
const dicePanel = document.getElementById("dice-panel");
const diceEl = document.getElementById("dice");
const btnRoll = document.getElementById("btn-roll");

btnRoll.addEventListener("click", ()=>{
  btnRoll.disabled = true;
  diceEl.classList.add("rolling");
  
  const rolledValue = 1 + Math.floor(Math.random() * 6);
  let spins = 0;
  
  const spinIv = setInterval(()=>{
    diceEl.textContent = String(1+Math.floor(Math.random()*6));
    spins++;
    if(spins > 8){
      clearInterval(spinIv);
      diceEl.classList.remove("rolling");
      diceEl.textContent = String(rolledValue);
      
      dicePanel.classList.add("hidden");
      moveTokenAlong(state.pos, rolledValue, ()=>{
        state.pos = (state.pos + rolledValue) % 24;
        openEvent(currentEventPool[state.step]);
      });
    }
  }, 70);
});

/* ================= EVENT MODAL ================= */
const eventModal = document.getElementById("event-modal");
const eventCard = document.getElementById("event-card");

function openEvent(ev){
  if(catchSpawnTimer) { clearTimeout(catchSpawnTimer); catchSpawnTimer = null; }
  if(catchLoopId) { cancelAnimationFrame(catchLoopId); catchLoopId = null; }

  eventModal.classList.add("active");
  eventCard.innerHTML = "";
  if(ev.type === "final"){ document.getElementById("step-value").textContent = "10 / 10"; }
  const tag = document.createElement("div");
  tag.className = "event-tag";
  tag.textContent = ev.tag;
  eventCard.appendChild(tag);

  if(ev.type === "dialogue") renderDialogue(ev);
  else if(ev.type === "card") renderCard(ev);
  else if(ev.type === "catch") renderCatch(ev);
  else if(ev.type === "memory") renderMemory(ev);
  else if(ev.type === "telepathy") renderTelepathy(ev);
  else if(ev.type === "final") renderFinal(ev);
}

function typewriter(el, text, done){
  el.textContent = "";
  let i = 0;
  const iv = setInterval(()=>{
    if(!el.parentNode) { clearInterval(iv); return; } 
    el.textContent += text[i]; i++;
    if(i >= text.length){ clearInterval(iv); if(done) done(); }
  }, 18);
}

function closeEventAndAdvance(){
  eventModal.classList.remove("active");
  const cell = boardEl.querySelector(`.cell[data-index="${state.pos}"]`);
  if(cell) cell.classList.add("done");

  state.step += 1;
  renderStatus();
  
  if(state.salary <= 0 || state.mental <= 0 || state.step >= 10){
    showEnding();
    return;
  }
  
  btnRoll.disabled = false;
  dicePanel.classList.remove("hidden");
}

/* ---- catch minigame ---- */
function renderCatch(ev){
  const tip = document.createElement("div");
  tip.className = "catch-tip";
  tip.textContent = "提示：■ 藍色為公文(得分) | ▲ 紅色為垃圾(扣分)";
  eventCard.appendChild(tip);

  const hud = document.createElement("div");
  hud.className = "catch-hud";
  hud.innerHTML = `<span id="catch-caught">已接文件：0 / 5</span><span id="catch-missed">漏接公文：0 / 3</span>`;
  eventCard.appendChild(hud);

  const area = document.createElement("div");
  area.className = "catch-area";
  area.innerHTML = `<div class="paddle" id="paddle" style="left:calc(50% - 23px);"></div>`;
  eventCard.appendChild(area);
  document.getElementById("paddle").innerHTML = figureHTML("fig-paddle");

  const controls = document.createElement("div");
  controls.className = "catch-controls";
  controls.innerHTML = `<button class="btn" id="btn-left">← 往左</button><button class="btn" id="btn-right">往右 →</button>`;
  eventCard.appendChild(controls);

  const paddle = document.getElementById("paddle");
  const areaW = 304, paddleW = 46;
  let paddleX = areaW/2 - paddleW/2;
  let caught = 0, missed = 0, done = false;
  let items = [];

  function movePaddle(dir){
    paddleX = Math.max(0, Math.min(areaW-paddleW, paddleX + dir*36));
    paddle.style.left = paddleX+"px";
  }
  document.getElementById("btn-left").addEventListener("click", ()=>movePaddle(-1));
  document.getElementById("btn-right").addEventListener("click", ()=>movePaddle(1));
  
  function keyHandler(e){
    if(done) return;
    if(e.key === "ArrowLeft") movePaddle(-1);
    if(e.key === "ArrowRight") movePaddle(1);
  }
  document.addEventListener("keydown", keyHandler);

  function spawnItem(){
    if(done) return;
    const isTrash = Math.random() < 0.28;
    const el = document.createElement("div");
    el.className = "catch-item " + (isTrash ? "trash" : "doc");
    el.style.left = Math.random()*(areaW-20)+"px";
    el.dataset.top = "-20";
    el.dataset.trash = isTrash ? "1" : "0";
    area.appendChild(el);
    items.push(el);
    catchSpawnTimer = setTimeout(spawnItem, 900);
  }
  spawnItem();

  function loop(){
    if(done) return;
    items.forEach(el=>{
      let t = parseFloat(el.dataset.top) + 2.8;
      el.dataset.top = t;
      el.style.top = t+"px";
      if(t > 150 && t < 175){
        const itemX = parseFloat(el.style.left);
        if(itemX+18 > paddleX && itemX < paddleX+paddleW){
          el.dataset.hit = "1";
          if(el.dataset.trash === "1"){
            finish(false, "糟糕！接到了紅色的午餐垃圾，被主管迎頭痛罵！");
          } else {
            caught++;
            document.getElementById("catch-caught").textContent = `已接文件：${caught} / 5`;
            el.remove();
            items = items.filter(x=>x!==el);
            if(caught >= 5) finish(true);
          }
        }
      }
      if(t > 190 && el.dataset.hit !== "1"){
        el.dataset.hit = "1";
        if(el.dataset.trash === "0"){
          missed++;
          document.getElementById("catch-missed").textContent = `漏接公文：${missed} / 3`;
          if(missed >= 3) finish(false, "藍色重要公文摔了一地，商業機密漏光了。");
        }
        el.remove();
        items = items.filter(x=>x!==el);
      }
    });
    if(!done) catchLoopId = requestAnimationFrame(loop);
  }
  catchLoopId = requestAnimationFrame(loop);

  function finish(success, msg){
    if(done) return;
    done = true;
    clearTimeout(catchSpawnTimer);
    cancelAnimationFrame(catchLoopId);
    document.removeEventListener("keydown", keyHandler);
    items.forEach(el=>el.remove());
    
    const res = document.createElement("div");
    res.className = "dialogue-box";
    res.style.textAlign = "center";
    res.textContent = success ? "【成功】效率牛逼！藍色公文完美分類歸檔！" : "【失敗】" + (msg || "業務疏失。");
    eventCard.appendChild(res);
    
    addCatchGameActionButtons(ev, success ? { salary: 200 } : { salary: -200 });
  }
}

/* ---- memory minigame ---- */
function renderMemory(ev){
  const hud = document.createElement("div");
  hud.className = "memory-hud";
  hud.id = "mem-hud";
  hud.textContent = "配對錯誤次數：0 / 3";
  eventCard.appendChild(hud);

  const values = ["Gary","Gary","Jerry","Jerry","Terry","Terry"];
  for(let i=values.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [values[i],values[j]]=[values[j],values[i]]; }

  const grid = document.createElement("div");
  grid.className = "memory-grid";
  values.forEach((v,i)=>{
    const c = document.createElement("div");
    c.className = "mem-card";
    c.dataset.value = v;
    c.dataset.index = i;
    c.textContent = "?";
    grid.appendChild(c);
  });
  eventCard.appendChild(grid);

  let flipped = [];
  let matched = 0, wrong = 0, locked = false, done = false;

  grid.querySelectorAll(".mem-card").forEach(c=>{
    c.addEventListener("click", ()=>{
      if(done || locked || c.classList.contains("flipped") || c.classList.contains("matched")) return;
      c.classList.add("flipped");
      c.textContent = c.dataset.value;
      flipped.push(c);
      if(flipped.length === 2){
        locked = true;
        setTimeout(()=>{
          if(!flipped[0] || !flipped[1]) return; 
          if(flipped[0].dataset.value === flipped[1].dataset.value){
            flipped.forEach(x=>x.classList.add("matched"));
            matched += 2;
          } else {
            wrong++;
            document.getElementById("mem-hud").textContent = `配對錯誤次數：${wrong} / 3`;
            flipped.forEach(x=>{ x.classList.remove("flipped"); x.textContent = "?"; });
          }
          flipped = [];
          locked = false;
          if(matched === 6) finish(true);
          else if(wrong >= 3) finish(false);
        }, 550);
      }
    });
  });

  function finish(success){
    if(done) return;
    done = true;
    const res = document.createElement("div");
    res.className = "dialogue-box";
    res.style.textAlign = "center";
    res.textContent = success ? "【成功】神準記憶！三大客戶全部配對成功！" : "【失敗】把 Gary 叫成 Terry...客戶震怒退件。";
    eventCard.appendChild(res);
    
    addGameActionButtonsNoRetry(success ? { salary: 200, mental: 1 } : { salary: -250 });
  }
}

  const choices = document.createElement("div");
  choices.className = "choices";
  eventCard.appendChild(choices);

  typewriter(box.querySelector(".txt"), ev.text, ()=>{
    const b = document.createElement("button");
    b.className = "btn primary";
    b.textContent = "揭曉最終職位評定";
    b.addEventListener("click", ()=>{
      eventModal.classList.remove("active");
      showEnding();
    });
    choices.appendChild(b);
  });
}

/* ================= BUTTONS CONTROLLER SYSTEM ================= */
function addStandardNextButton(){
  const row = document.createElement("div");
  row.className = "next-row";
  const b = document.createElement("button");
  b.className = "btn primary";
  b.textContent = "結算並繼續";
  b.addEventListener("click", function handleNext() {
    b.removeEventListener("click", handleNext);
    closeEventAndAdvance();
  });
  row.appendChild(b);
  eventCard.appendChild(row);
}

function addCatchGameActionButtons(ev, scoreEffect) {
  const row = document.createElement("div");
  row.className = "next-row";

  const btnRetry = document.createElement("button");
  btnRetry.className = "btn";
  btnRetry.textContent = "重新挑戰 (Retry)";
  btnRetry.addEventListener("click", () => {
    openEvent(ev);
  });

  const btnNext = document.createElement("button");
  btnNext.className = "btn primary";
  let scoreText = getScoreText(scoreEffect);
  btnNext.textContent = `結算分數並前進 (${scoreText || "Next"})`;

  btnNext.addEventListener("click", function handleGameNext() {
    btnNext.removeEventListener("click", handleGameNext);
    applyEffect(scoreEffect);
    closeEventAndAdvance();
  });

  row.appendChild(btnRetry);
  row.appendChild(btnNext);
  eventCard.appendChild(row);
}

function addGameActionButtonsNoRetry(scoreEffect) {
  const row = document.createElement("div");
  row.className = "next-row";

  const btnNext = document.createElement("button");
  btnNext.className = "btn primary";
  let scoreText = getScoreText(scoreEffect);
  btnNext.textContent = `結算分數並前進 (${scoreText || "Next"})`;

  btnNext.addEventListener("click", function handleGameNoRetryNext() {
    btnNext.removeEventListener("click", handleGameNoRetryNext);
    applyEffect(scoreEffect);
    closeEventAndAdvance();
  });

  row.appendChild(btnNext);
  eventCard.appendChild(row);
}

function getScoreText(scoreEffect) {
  let scoreText = "";
  if (scoreEffect.salary) scoreText += (scoreEffect.salary > 0 ? "Salary +$" : "Salary -$") + Math.abs(scoreEffect.salary);
  if (scoreEffect.mental) scoreText += (scoreText ? ", " : "") + (scoreEffect.mental > 0 ? "Mental +" : "Mental -") + Math.abs(scoreEffect.mental);
  return scoreText;
}

/* ================= ENDING GENERATOR ================= */
function determineEnding(){
  if(state.salary < 4200){
    return { title:"頂級背鍋俠 (The Ultimate Scapegoat)",
      quote:"你在各項業務與小遊戲中屢屢出錯，完美承擔了公司所有的雷。你不是在背鍋，空間是在去背鍋的路上。主管和同事們都發自內心地感謝你的巨大犧牲。",
      fig:"scapegoat" };
  }
  if(state.mental <= 1){
    return { title:"自動導航型社畜 (The Autopilot Drone)",
      quote:"你在各種奇葩對話與折磨中耗盡了心智。你的精神已進化到靈魂肉體分離的最高境界。主管在前面口沫橫飛地罵你，你的大腦會自動切換成絕對靜音模式。",
      fig:"autopilot" };
  }
  if(state.salary >= 4700 && state.mental >= 3){
    return { title:"卷王之王 (The Overtime King)",
      quote:"不可思議！你竟然在這種高壓環境下成功賺到大筆獎金、完美通過考驗！你成功拉高了全公司的內卷與加班標準，現在同事們都在背地裡恨透你了。",
      fig:"overtime" };
  }
  return { title:"萬能工具人 (The Omnipotent Jack-of-All-Trades)",
    quote:"你表現平平，挑不出大毛病。但修公司水電、做臨時美編、精準通靈主管需求、甚至應付客戶你全都會，是公司最愛、最無法取代的一顆萬能螺絲釘。",
    fig:"jack" };
}

function endingFigureHTML(kind){
  if(kind === "scapegoat"){
    return `<div class="figure hunch">
      <div class="head"><span class="eyes">-__-</span></div>
      <div class="torso"></div><div class="arms"></div><div class="legs"></div>
      <div style="position:absolute;top:28px;left:50%;transform:translateX(-50%);width:46px;height:13px;border:2.5px solid var(--line);border-top:none;border-radius:0 0 24px 24px;border-color:var(--cyan);"></div>
    </div>`;
  }
  if(kind === "autopilot"){
    return `<div style="position:relative;width:56px;height:92px;">
      <div class="figure" style="position:absolute;bottom:0;">
        <div class="head"><span class="eyes">x_x</span></div><div class="torso"></div><div class="arms"></div><div class="legs"></div>
      </div>
      <div class="figure" style="position:absolute;top:-24px;left:10px;opacity:.4;">
        <div class="head"><span class="eyes">· _ ·</span></div><div class="torso"></div>
      </div>
    </div>`;
  }
  if(kind === "overtime"){
    return `<div class="figure" style="filter:drop-shadow(0 0 9px var(--cyan));">
      <div class="head"><span class="eyes">· _ ·</span></div><div class="torso"></div><div class="arms"></div><div class="legs"></div>
    </div>`;
  }
  return `<div class="figure">
    <div class="head"><span class="eyes">· _ ·</span></div>
    <div class="torso"></div>
    <div class="arms" style="width:66px;"></div>
    <div class="arms" style="width:52px;transform:rotate(8deg);top:36px;"></div>
    <div class="legs"></div>
  </div>`;
}

function showEnding(){
  document.getElementById("screen-game").classList.remove("active");
  document.getElementById("screen-end").classList.add("active");
  const e = determineEnding();
  document.getElementById("ending-title").textContent = e.title;
  document.getElementById("ending-quote").textContent = e.quote;
  document.getElementById("ending-fig").innerHTML = endingFigureHTML(e.fig);
}

/* ================= RESET / RESTART LOGIC ================= */
function backToRosterSelect(){
  // 1. 隱藏結算畫面與全黑覆蓋層
  document.getElementById("screen-end").classList.remove("active");
  document.getElementById("screen-shutdown").classList.remove("active");
  
  // 2. 徹底重置大富翁地圖上所有格子的「已過關 (done)」變色狀態
  document.querySelectorAll(".cell").forEach(c => c.classList.remove("done"));
  
  // 3. 徹底清空前一局可能殘留的進入遊戲按鈕
  const enterBtn = document.getElementById("btn-enter");
  if(enterBtn) enterBtn.remove();
  
  // 4. 重置首頁牛馬職員的表情與狀態，把駝背挺直
  const slaveFig = document.getElementById("fig-slave");
  if(slaveFig) slaveFig.classList.remove("hunch");
  setExpression(slaveFig, "default");
  
  // 5. 核心修復點：將全域遊戲狀態的坐標和關卡步數「徹底歸零」，防止步數加算與內容錯亂
  state = { salary: 4500, mental: 5, step: 0, pos: 0 };
  placeTokenAt(0, true); // 棋子強制定格回起點(入口)
  
  // 6. 重新啟用擲骰子按鈕
  btnRoll.disabled = false;
  
  // 7. 切換回初始選角首頁
  document.getElementById("screen-start").classList.add("active");
}

document.getElementById("btn-reincarnate").addEventListener("click", backToRosterSelect);
document.getElementById("btn-shutdown").addEventListener("click", ()=>{
  document.getElementById("screen-shutdown").classList.add("active");
});
document.getElementById("btn-final-restart").addEventListener("click", backToRosterSelect);
</script>
